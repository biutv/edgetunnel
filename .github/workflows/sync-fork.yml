# .github/workflows/sync-fork.yml
name: Sync Fork

on:
  #  schedule:  # 方式一：定时触发，例如每天UTC时间0点（北京时间8点）运行一次
  #    - cron: '0 0 * * *' 
  workflow_dispatch:  # 方式二：手动触发，允许在GitHub网页界面上点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 使用现成的同步 Action
      - name: Sync Fork
        uses: TG908/fork-sync@v1.1
        with:
          # GitHub 会自动提供 GITHUB_TOKEN，具有当前仓库的读写权限
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 上游仓库的拥有者（原作者）的用户名或组织名
          owner: ORIGINAL_OWNER
          # 上游仓库需要同步的分支（通常是 main 或 master）
          head: main
          # 你自己 Fork 的仓库中需要被更新的分支（必须与 head 相同或你希望同步到的目标分支）
          base: main
          # 可选：如果上游仓库是私有的，可能需要一个具有读取权限的 PAT
          # upstream_token: ${{ secrets.UPSTREAM_TOKEN }}
